<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>GV-CoT Neural Universe</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100vw; height: 100vh;
    background: #04050b;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", system-ui, sans-serif;
    color: white;
    -webkit-font-smoothing: antialiased;
  }
  #scene { width: 100vw; height: 100vh; display: block; cursor: grab; }
  #scene:active { cursor: grabbing; }

  /* ─────────── HUD: TOP-LEFT TITLE ─────────── */
  .hud-top {
    position: fixed; top: 20px; left: 22px; z-index: 10;
    display: flex; align-items: center; gap: 14px;
    background: rgba(15, 18, 30, 0.55);
    backdrop-filter: blur(22px) saturate(180%);
    -webkit-backdrop-filter: blur(22px) saturate(180%);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 999px;
    padding: 10px 18px;
  }
  .hud-title {
    font-size: 12px; letter-spacing: 1.2px;
    color: rgba(255,255,255,0.85); font-weight: 600;
    text-transform: uppercase;
  }
  .hud-title .dot {
    display: inline-block; width: 7px; height: 7px;
    background: #22ee88; border-radius: 50%; margin-right: 8px;
    box-shadow: 0 0 10px #22ee88, 0 0 20px rgba(34,238,136,0.4);
    animation: pulse 2s ease-in-out infinite;
    vertical-align: middle;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.55; transform: scale(0.7); }
  }
  .hud-sub {
    font-size: 11px; color: rgba(255,255,255,0.4);
    letter-spacing: 0.3px;
  }

  /* ─────────── HUD: FILTER PILLS (TOP-CENTER) ─────────── */
  .filter-pills {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    z-index: 10; display: flex; gap: 4px;
    background: rgba(15, 18, 30, 0.55);
    backdrop-filter: blur(22px) saturate(180%);
    -webkit-backdrop-filter: blur(22px) saturate(180%);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 999px; padding: 5px;
  }
  .filter-pill {
    padding: 8px 16px; border-radius: 999px;
    font-size: 11.5px; font-weight: 500; letter-spacing: 0.2px;
    color: rgba(255,255,255,0.65); cursor: pointer; user-select: none;
    transition: all 280ms cubic-bezier(0.16, 1, 0.3, 1);
    border: 1px solid transparent; background: transparent;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .filter-pill .count {
    display: inline-block; min-width: 18px; padding: 1px 6px;
    background: rgba(255,255,255,0.06); border-radius: 999px;
    font-size: 10px; color: rgba(255,255,255,0.6);
  }
  .filter-pill:hover { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.9); }
  .filter-pill.active { background: rgba(255,255,255,0.08); color: white; border-color: rgba(255,255,255,0.15); }
  .filter-pill.active.valid  { border-color: rgba(34, 238, 136, 0.45); }
  .filter-pill.active.failed { border-color: rgba(255,  80,  96, 0.45); }

  /* ─────────── INFO PANEL (RIGHT) ─────────── */
  .info-panel {
    position: fixed; top: 80px; right: 22px;
    width: 350px; max-height: calc(100vh - 170px);
    background: rgba(15, 18, 30, 0.55);
    backdrop-filter: blur(28px) saturate(180%);
    -webkit-backdrop-filter: blur(28px) saturate(180%);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 18px; padding: 22px;
    z-index: 10; overflow-y: auto;
    box-shadow: 0 12px 60px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.04);
    transition: opacity 320ms ease, transform 320ms cubic-bezier(0.16, 1, 0.3, 1);
  }
  .info-panel::-webkit-scrollbar { width: 6px; }
  .info-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }
  .info-empty {
    color: rgba(255,255,255,0.4); text-align: center;
    padding: 40px 12px; font-size: 13px; line-height: 1.7;
  }
  .info-empty .accent { color: #58a6ff; }
  .panel-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px; border-radius: 999px;
    font-size: 10.5px; font-weight: 700; letter-spacing: 0.8px;
    text-transform: uppercase; margin-bottom: 14px;
  }
  .panel-badge.valid  { background: rgba(34,238,136,0.10); color: #36f0a3; border: 1px solid rgba(34,238,136,0.35); }
  .panel-badge.failed { background: rgba(255, 80, 96,0.10); color: #ff6678; border: 1px solid rgba(255, 80, 96,0.35); }
  .panel-title { font-size: 18px; font-weight: 600; color: white; margin-bottom: 6px; letter-spacing: -0.2px; }
  .panel-subtitle { color: rgba(255,255,255,0.55); font-size: 12.5px; line-height: 1.6; margin-bottom: 20px; }

  .panel-section { margin-bottom: 18px; }
  .panel-section-label {
    font-size: 10px; text-transform: uppercase;
    letter-spacing: 1px; color: rgba(255,255,255,0.42);
    margin-bottom: 9px; font-weight: 600;
  }

  .meter {
    height: 5px; background: rgba(255,255,255,0.06);
    border-radius: 3px; overflow: hidden; position: relative;
    margin-bottom: 6px;
  }
  .meter-fill {
    height: 100%; width: 0;
    border-radius: 3px;
    transition: width 1.05s cubic-bezier(0.22, 1, 0.36, 1);
    box-shadow: 0 0 10px currentColor;
  }
  .meter-meta {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 12px;
  }
  .meter-meta .num { font-size: 15px; font-weight: 600; color: white; font-variant-numeric: tabular-nums; }
  .meter-meta .tag { color: rgba(255,255,255,0.4); font-size: 10.5px; letter-spacing: 0.4px; }

  .panel-row {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 12.5px; padding: 7px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .panel-row:last-child { border-bottom: none; }
  .panel-row .key { color: rgba(255,255,255,0.55); }
  .panel-row .val { color: white; font-variant-numeric: tabular-nums; font-weight: 500; }
  .panel-row .val.ok    { color: #36f0a3; }
  .panel-row .val.bad   { color: #ff6678; }

  /* ─────────── TIMELINE (BOTTOM) ─────────── */
  .timeline {
    position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%);
    z-index: 10; display: flex; align-items: center;
    background: rgba(15, 18, 30, 0.55);
    backdrop-filter: blur(22px) saturate(180%);
    -webkit-backdrop-filter: blur(22px) saturate(180%);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 999px; padding: 10px 18px;
  }
  .tl-dot {
    width: 9px; height: 9px; border-radius: 50%;
    margin: 0 6px; cursor: pointer; position: relative;
    transition: all 280ms cubic-bezier(0.16, 1, 0.3, 1);
  }
  .tl-dot::before {
    content: ""; position: absolute; inset: -5px;
    border-radius: 50%; border: 1px solid transparent;
    transition: all 280ms;
  }
  .tl-dot.valid  { background: rgba(34,238,136,0.55); box-shadow: 0 0 6px rgba(34,238,136,0.6); }
  .tl-dot.failed { background: rgba(255, 80, 96,0.65); box-shadow: 0 0 6px rgba(255, 80, 96,0.6); }
  .tl-dot.selected::before { border-color: rgba(255,255,255,0.7); inset: -5px; }
  .tl-dot.selected { transform: scale(1.3); }
  .tl-dot:hover { transform: scale(1.45); }
  .tl-sep { height: 1px; width: 6px; background: rgba(255,255,255,0.08); }

  /* ─────────── HELP TEXT ─────────── */
  .hud-help {
    position: fixed; bottom: 26px; left: 22px; z-index: 10;
    font-size: 10.5px; color: rgba(255,255,255,0.35); line-height: 1.7;
    background: rgba(15, 18, 30, 0.5);
    backdrop-filter: blur(18px) saturate(180%);
    -webkit-backdrop-filter: blur(18px) saturate(180%);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px; padding: 10px 14px;
  }
  .hud-help kbd {
    padding: 1px 6px; background: rgba(255,255,255,0.07);
    border-radius: 4px; font-family: ui-monospace, SFMono-Regular, monospace;
    color: rgba(255,255,255,0.75); font-size: 10px;
  }

  /* ─────────── STATS HUD (TOP-RIGHT) ─────────── */
  .hud-stats {
    position: fixed; top: 20px; right: 22px; z-index: 10;
    display: flex; gap: 10px;
  }
  .hud-stat {
    background: rgba(15, 18, 30, 0.55);
    backdrop-filter: blur(22px) saturate(180%);
    -webkit-backdrop-filter: blur(22px) saturate(180%);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px; padding: 9px 14px;
    display: flex; flex-direction: column; align-items: flex-start;
  }
  .hud-stat .num {
    font-size: 16px; font-weight: 600; color: white;
    font-variant-numeric: tabular-nums; line-height: 1;
  }
  .hud-stat .lbl {
    font-size: 9.5px; letter-spacing: 0.8px; color: rgba(255,255,255,0.45);
    text-transform: uppercase; margin-top: 3px;
  }

  /* Hide info-panel until ready */
  .info-panel.hidden { opacity: 0; transform: translateX(20px); pointer-events: none; }
</style>

<body>

<div class="filter-pills">

<script type="application/gvcot-entry" id="gvcot-entry">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

const DATA = __DATA_JSON__;
const N = DATA.steps.length;

// ╔═══════════════════════════════════════════════════════════╗
// ║  CORE SCENE                                                ║
// ╚═══════════════════════════════════════════════════════════╝
const canvas = document.getElementById('scene');
const renderer = new THREE.WebGLRenderer({
  canvas, antialias: true, alpha: false, powerPreference: 'high-performance'
});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.85;
renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x03040a, 0.028);

const camera = new THREE.PerspectiveCamera(58, window.innerWidth / window.innerHeight, 0.1, 250);
camera.position.set(0, 7, 30);

const controls = new OrbitControls(camera, canvas);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.rotateSpeed = 0.6;
controls.zoomSpeed = 0.75;
controls.panSpeed = 0.5;
controls.minDistance = 6;
controls.maxDistance = 90;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.22;

// Lights — for the bits that don't use shaders (kept low; nodes use additive shaders)
scene.add(new THREE.AmbientLight(0x2a3a66, 0.22));
const keyL = new THREE.DirectionalLight(0xc7d2fe, 0.32);  keyL.position.set(22, 28, 18);  scene.add(keyL);
const rimL = new THREE.DirectionalLight(0x6049b8, 0.22);  rimL.position.set(-22, -16, 8); scene.add(rimL);

// ╔═══════════════════════════════════════════════════════════╗
// ║  ENVIRONMENT — nebula plane, multi-layer starfields, dust ║
// ╚═══════════════════════════════════════════════════════════╝
const nebulaGeo = new THREE.PlaneGeometry(360, 240);
const nebulaMat = new THREE.ShaderMaterial({
  uniforms: { time: { value: 0 } },
  vertexShader: `
    varying vec2 vUv;
    void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }
  `,
  fragmentShader: `
    uniform float time;
    varying vec2 vUv;
    float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453); }
    float noise(vec2 p){
      vec2 i = floor(p); vec2 f = fract(p);
      float a = hash(i), b = hash(i+vec2(1.,0.)), c = hash(i+vec2(0.,1.)), d = hash(i+vec2(1.,1.));
      vec2 u = f*f*(3.-2.*f);
      return mix(a, b, u.x) + (c - a) * u.y * (1. - u.x) + (d - b) * u.x * u.y;
    }
    float fbm(vec2 p){ float v=0., a=0.5; for(int i=0;i<6;i++){ v += a*noise(p); p*=2.; a*=0.5; } return v; }
    void main() {
      vec2 p = vUv * 2.4 + vec2(time*0.012, time*0.006);
      float n = fbm(p);
      float n2 = fbm(p * 1.7 + vec2(time*0.008, -time*0.004));
      vec3 c1 = vec3(0.012, 0.022, 0.060);   // deep navy
      vec3 c2 = vec3(0.045, 0.018, 0.075);   // muted violet
      vec3 c3 = vec3(0.015, 0.060, 0.080);   // muted teal trace
      vec3 c4 = vec3(0.003, 0.004, 0.010);   // near pitch
      vec3 mid = mix(c1, c2, n);
      mid = mix(mid, c3, n2 * 0.22);
      vec3 col = mix(c4, mid, smoothstep(0.30, 0.90, n));
      vec2 q = vUv - 0.5;
      float vig = 1.0 - dot(q, q) * 2.10;
      col *= clamp(vig, 0.18, 1.0);
      gl_FragColor = vec4(col, 1.0);
    }
  `,
  depthWrite: false, depthTest: false,
});
const nebula = new THREE.Mesh(nebulaGeo, nebulaMat);
nebula.position.z = -85; nebula.renderOrder = -1;
scene.add(nebula);

function starfield(count, range, size, opacity, tint) {
  const positions = new Float32Array(count * 3);
  const colors = new Float32Array(count * 3);
  for (let i = 0; i < count; i++) {
    positions[i*3]   = (Math.random() - 0.5) * range;
    positions[i*3+1] = (Math.random() - 0.5) * range;
    positions[i*3+2] = (Math.random() - 0.5) * range;
    const t = Math.random();
    colors[i*3]   = tint.r * (0.6 + t * 0.4);
    colors[i*3+1] = tint.g * (0.6 + t * 0.4);
    colors[i*3+2] = tint.b * (0.6 + t * 0.4);
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
  const mat = new THREE.PointsMaterial({
    size: size, vertexColors: true, transparent: true, opacity: opacity,
    blending: THREE.AdditiveBlending, depthWrite: false, sizeAttenuation: true,
  });
  return new THREE.Points(geo, mat);
}
scene.add(starfield(2800, 170, 0.13, 0.32, {r:0.78,g:0.82,b:0.95}));
scene.add(starfield(700,  85,  0.09, 0.22, {r:0.60,g:0.75,b:0.95}));

const DUST_N = 700;
const dustPos = new Float32Array(DUST_N * 3);
const dustVel = [];
for (let i = 0; i < DUST_N; i++) {
  dustPos[i*3]   = (Math.random() - 0.5) * 70;
  dustPos[i*3+1] = (Math.random() - 0.5) * 70;
  dustPos[i*3+2] = (Math.random() - 0.5) * 70;
  dustVel.push({ x:(Math.random()-0.5)*0.006, y:(Math.random()-0.5)*0.004, z:(Math.random()-0.5)*0.006 });
}
const dustGeo = new THREE.BufferGeometry();
dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPos, 3));
const dustMat = new THREE.PointsMaterial({
  color: 0x5572aa, size: 0.08, transparent: true, opacity: 0.22,
  blending: THREE.AdditiveBlending, depthWrite: false, sizeAttenuation: true,
});
const dust = new THREE.Points(dustGeo, dustMat);
scene.add(dust);

// ╔═══════════════════════════════════════════════════════════╗
// ║  3D FORCE-DIRECTED LAYOUT                                  ║
// ╚═══════════════════════════════════════════════════════════╝
function computeLayout(N, seq, sem) {
  const pos = [];
  for (let i = 0; i < N; i++) {
    const a = (i / N) * Math.PI * 2.3;
    pos.push(new THREE.Vector3(
      Math.cos(a) * 7 + (Math.random() - 0.5) * 3,
      (i - (N - 1) / 2) * 1.5 + (Math.random() - 0.5) * 2.5,
      Math.sin(a) * 7 + (Math.random() - 0.5) * 3
    ));
  }
  const iter = 380;
  for (let k = 0; k < iter; k++) {
    const T = 1 - k / iter;
    const f = pos.map(() => new THREE.Vector3());
    for (let i = 0; i < N; i++) {
      for (let j = i + 1; j < N; j++) {
        const d = pos[i].clone().sub(pos[j]);
        let dist = d.length(); if (dist < 0.5) dist = 0.5;
        const force = 22 / (dist * dist);
        d.normalize().multiplyScalar(force);
        f[i].add(d); f[j].sub(d);
      }
    }
    seq.forEach(([a, b]) => {
      const d = pos[b].clone().sub(pos[a]);
      const dist = d.length();
      const ideal = 5.2;
      d.normalize().multiplyScalar((dist - ideal) * 0.20);
      f[a].add(d); f[b].sub(d);
    });
    sem.forEach(({ i, j, w }) => {
      const d = pos[j].clone().sub(pos[i]);
      const dist = d.length();
      const ideal = 7.5;
      d.normalize().multiplyScalar((dist - ideal) * 0.05 * w);
      f[i].add(d); f[j].sub(d);
    });
    // mild center pull keeps things on screen
    for (let i = 0; i < N; i++) {
      f[i].add(pos[i].clone().multiplyScalar(-0.006));
    }
    for (let i = 0; i < N; i++) {
      const mag = Math.min(f[i].length(), T * 1.6);
      f[i].normalize().multiplyScalar(mag);
      pos[i].add(f[i]);
    }
  }
  return pos;
}
const positions = computeLayout(N, DATA.sequential, DATA.semantic);

// ╔═══════════════════════════════════════════════════════════╗
// ║  ENERGY-SPHERE NODE                                        ║
// ╚═══════════════════════════════════════════════════════════╝
// Deep, sophisticated palette — never neon
const COLORS = {
  valid:    new THREE.Color(0x10b981),   // refined emerald (between #047857 and #34d399)
  failed:   new THREE.Color(0x991b1b),   // rich burgundy/crimson
  warning:  new THREE.Color(0xd97706),   // muted amber
  selected: new THREE.Color(0xbae6fd),   // icy-blue
};
const CORE_COLORS = {
  valid:    new THREE.Color(0x34d399),   // brighter core inside the emerald shell
  failed:   new THREE.Color(0xdc2626),   // brighter burgundy core
  warning:  new THREE.Color(0xfbbf24),
  selected: new THREE.Color(0xe0f2fe),
};
function nodeState(i) {
  return DATA.preds[i] === 0 ? 'failed' : 'valid';
}

function makeShellMaterial(color) {
  return new THREE.ShaderMaterial({
    uniforms: {
      color:     { value: new THREE.Color(color) },
      time:      { value: 0 },
      intensity: { value: 1.0 },
      opacity:   { value: 0.55 },
    },
    vertexShader: `
      varying vec3 vNormal;
      varying vec3 vPosition;
      varying vec3 vWorldPos;
      void main(){
        vNormal = normalize(normalMatrix * normal);
        vPosition = position;
        vec4 wp = modelMatrix * vec4(position, 1.0);
        vWorldPos = wp.xyz;
        gl_Position = projectionMatrix * viewMatrix * wp;
      }
    `,
    fragmentShader: `
      uniform vec3 color;
      uniform float time;
      uniform float intensity;
      uniform float opacity;
      varying vec3 vNormal;
      varying vec3 vPosition;
      varying vec3 vWorldPos;
      void main(){
        vec3 viewDir = normalize(cameraPosition - vWorldPos);
        float fresnel = pow(1.0 - clamp(dot(viewDir, vNormal), 0.0, 1.0), 2.6);
        float wave = 0.5 + 0.5 * sin(time * 1.4 + vPosition.y * 3.0 + vPosition.x * 1.1);
        float breath = 0.5 + 0.5 * sin(time * 0.8);
        // Edge-only glow — center of shell stays clean so the core/number is visible
        vec3 col = color * (0.18 + fresnel * 1.30 + wave * 0.14 + breath * 0.08) * intensity;
        float alpha = opacity * (0.06 + fresnel * 1.15);
        gl_FragColor = vec4(col, clamp(alpha, 0.0, 1.0));
      }
    `,
    transparent: true, depthWrite: false,
    blending: THREE.AdditiveBlending, side: THREE.DoubleSide,
  });
}

// Step-number label as a billboarded Sprite — readable from every angle
function makeNumberSprite(num) {
  const c = document.createElement('canvas');
  c.width = 128; c.height = 128;
  const ctx = c.getContext('2d');
  // Soft dark disc behind the number for legibility
  const grad = ctx.createRadialGradient(64, 64, 8, 64, 64, 56);
  grad.addColorStop(0.00, 'rgba(7, 9, 18, 0.95)');
  grad.addColorStop(0.65, 'rgba(7, 9, 18, 0.80)');
  grad.addColorStop(1.00, 'rgba(7, 9, 18, 0.00)');
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.arc(64, 64, 56, 0, Math.PI * 2); ctx.fill();
  // The number
  ctx.font = 'bold 60px -apple-system, "Inter", "Segoe UI", Arial, sans-serif';
  ctx.fillStyle = '#ffffff';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  // Slight outer glow for crispness on bright backgrounds
  ctx.shadowColor = 'rgba(0,0,0,0.8)';
  ctx.shadowBlur = 6;
  ctx.fillText(String(num), 64, 66);

  const tex = new THREE.CanvasTexture(c);
  tex.minFilter = THREE.LinearFilter;
  tex.magFilter = THREE.LinearFilter;
  tex.anisotropy = 4;
  tex.needsUpdate = true;
  const mat = new THREE.SpriteMaterial({
    map: tex, transparent: true,
    depthWrite: false, depthTest: false,   // always renders on top of the node
  });
  const s = new THREE.Sprite(mat);
  s.renderOrder = 999;
  return s;
}

function createNode(i, position) {
  const group = new THREE.Group();
  group.position.copy(position);

  const state = nodeState(i);
  const color = COLORS[state];
  const coreColor = CORE_COLORS[state];
  const sal = DATA.saliency[i];
  const base = i === N - 1 ? 1.55 : (sal >= 0.75 ? 1.45 : (sal >= 0.4 ? 1.18 : 0.95));

  // Outer glass shell — edge-only fresnel, center stays clear
  const shellGeo = new THREE.IcosahedronGeometry(base, 3);
  const shellMat = makeShellMaterial(color);
  shellMat.uniforms.opacity.value = 0.42;
  const shell = new THREE.Mesh(shellGeo, shellMat);
  group.add(shell);

  // Inner core — small, controlled, never blinding
  const coreGeo = new THREE.SphereGeometry(base * 0.28, 32, 32);
  const coreMat = new THREE.MeshBasicMaterial({
    color: coreColor, transparent: true, opacity: 0.85,
  });
  const core = new THREE.Mesh(coreGeo, coreMat);
  group.add(core);

  // Halo — much tighter, lower opacity (no more washout)
  const haloGeo = new THREE.SphereGeometry(base * 1.30, 32, 32);
  const haloMat = makeShellMaterial(color);
  haloMat.uniforms.opacity.value = 0.08;
  haloMat.uniforms.intensity.value = 0.55;
  const halo = new THREE.Mesh(haloGeo, haloMat);
  group.add(halo);

  // Equatorial ring
  const ringGeo = new THREE.TorusGeometry(base * 1.50, 0.028, 14, 90);
  const ringMat = new THREE.MeshBasicMaterial({
    color, transparent: true, opacity: 0.32,
    blending: THREE.AdditiveBlending, depthWrite: false,
  });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.rotation.x = Math.PI / 2;
  group.add(ring);

  // Secondary slower ring
  const ring2Geo = new THREE.TorusGeometry(base * 1.85, 0.018, 12, 80);
  const ring2Mat = new THREE.MeshBasicMaterial({
    color, transparent: true, opacity: 0.18,
    blending: THREE.AdditiveBlending, depthWrite: false,
  });
  const ring2 = new THREE.Mesh(ring2Geo, ring2Mat);
  ring2.rotation.x = Math.PI / 3.2;
  ring2.rotation.y = Math.PI / 6;
  group.add(ring2);

  // Hover ring (invisible by default)
  const hoverRingGeo = new THREE.TorusGeometry(base * 2.30, 0.038, 16, 110);
  const hoverRingMat = new THREE.MeshBasicMaterial({
    color: 0xe0f2fe, transparent: true, opacity: 0,
    blending: THREE.AdditiveBlending, depthWrite: false,
  });
  const hoverRing = new THREE.Mesh(hoverRingGeo, hoverRingMat);
  hoverRing.rotation.x = Math.PI / 2;
  group.add(hoverRing);

  // Selection cage (invisible by default)
  const selCageGeo = new THREE.IcosahedronGeometry(base * 1.85, 1);
  const selCageMat = new THREE.MeshBasicMaterial({
    color: 0xbae6fd, wireframe: true,
    transparent: true, opacity: 0,
    blending: THREE.AdditiveBlending, depthWrite: false,
  });
  const selCage = new THREE.Mesh(selCageGeo, selCageMat);
  group.add(selCage);

  // Orbiting micro-particles (count halved, much lower opacity)
  const P = 18;
  const ppos = new Float32Array(P * 3);
  const pData = [];
  for (let k = 0; k < P; k++) {
    const r = base * (1.35 + Math.random() * 1.4);
    const theta = Math.random() * Math.PI * 2;
    const phi   = Math.acos(2 * Math.random() - 1);
    ppos[k*3]   = r * Math.sin(phi) * Math.cos(theta);
    ppos[k*3+1] = r * Math.sin(phi) * Math.sin(theta);
    ppos[k*3+2] = r * Math.cos(phi);
    pData.push({
      baseR: r, theta, phi,
      speedT: 0.0005 + Math.random() * 0.0010,
      speedP: 0.0003 + Math.random() * 0.0007,
      phase: Math.random() * Math.PI * 2,
    });
  }
  const pGeo = new THREE.BufferGeometry();
  pGeo.setAttribute('position', new THREE.BufferAttribute(ppos, 3));
  const pMat = new THREE.PointsMaterial({
    color, size: 0.07, transparent: true, opacity: 0.35,
    blending: THREE.AdditiveBlending, depthWrite: false, sizeAttenuation: true,
  });
  const particles = new THREE.Points(pGeo, pMat);
  group.add(particles);

  // Step-number sprite — always faces the camera, always on top
  const label = makeNumberSprite(i + 1);
  const lScale = Math.max(1.2, base * 1.05);
  label.scale.set(lScale, lScale, 1);
  group.add(label);

  // Invisible click target
  const targetGeo = new THREE.SphereGeometry(base * 2.4, 16, 16);
  const targetMat = new THREE.MeshBasicMaterial({ visible: false });
  const target = new THREE.Mesh(targetGeo, targetMat);
  target.userData = { isClickTarget: true, nodeIdx: i };
  group.add(target);

  group.userData = {
    idx: i, state, color, base, sal,
    shell, core, halo, ring, ring2, hoverRing, selCage, particles, label, target,
    pData,
    phase: Math.random() * Math.PI * 2,
    floatPhase: Math.random() * Math.PI * 2,
    floatBase: position.clone(),
    targetIntensity: 1.0, currentIntensity: 1.0,
    targetHoverOpacity: 0, currentHoverOpacity: 0,
    targetSelOpacity: 0,   currentSelOpacity: 0,
  };
  return group;
}

const nodes = positions.map((p, i) => createNode(i, p));
nodes.forEach(n => scene.add(n));

// ╔═══════════════════════════════════════════════════════════╗
// ║  CONNECTION BEAMS                                          ║
// ╚═══════════════════════════════════════════════════════════╝
function createBeam(fromNode, toNode, opts) {
  const { color, opacity, type, particles: doParticles, tubeR } = opts;
  const fromP = fromNode.position;
  const toP   = toNode.position;
  const mid   = fromP.clone().add(toP).multiplyScalar(0.5);
  const len   = fromP.distanceTo(toP);
  // Curve offset: perpendicular up + slight side
  const dir   = toP.clone().sub(fromP).normalize();
  const upish = new THREE.Vector3(0, 1, 0);
  let perp   = new THREE.Vector3().crossVectors(upish, dir);
  if (perp.lengthSq() < 0.01) perp.set(1, 0, 0);
  perp.normalize().multiplyScalar(len * 0.18);
  const yOff = upish.clone().multiplyScalar(len * 0.10);
  mid.add(perp).add(yOff);

  const curve = new THREE.QuadraticBezierCurve3(fromP.clone(), mid, toP.clone());
  const tubeGeo = new THREE.TubeGeometry(curve, 36, tubeR, 8, false);
  const tubeMat = new THREE.MeshBasicMaterial({
    color, transparent: true, opacity,
    blending: THREE.AdditiveBlending, depthWrite: false,
  });
  const tube = new THREE.Mesh(tubeGeo, tubeMat);

  let pPoints = null, pData = [], pPositions = null;
  if (doParticles) {
    const PCOUNT = type === 'failed' ? 5 : 4;
    pPositions = new Float32Array(PCOUNT * 3);
    for (let i = 0; i < PCOUNT; i++) {
      const tStart = i / PCOUNT;
      const p = curve.getPointAt(tStart);
      pPositions[i*3] = p.x; pPositions[i*3+1] = p.y; pPositions[i*3+2] = p.z;
      pData.push({ t: tStart, speed: 0.0025 + Math.random() * 0.0030 });
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(pPositions, 3));
    const pMat = new THREE.PointsMaterial({
      color, size: 0.13, transparent: true, opacity: 0.85,
      blending: THREE.AdditiveBlending, depthWrite: false, sizeAttenuation: true,
    });
    pPoints = new THREE.Points(geo, pMat);
  }

  const group = new THREE.Group();
  group.add(tube);
  if (pPoints) group.add(pPoints);
  group.userData = {
    curve, type, color, fromIdx: fromNode.userData.idx, toIdx: toNode.userData.idx,
    tube, tubeMat, pPoints, pData, pPositions,
    baseOpacity: opacity, targetOpacity: opacity, currentOpacity: opacity,
  };
  return group;
}

const beams = [];
DATA.sequential.forEach(([a, b]) => {
  const isBreak = DATA.preds[a] === 1 && DATA.preds[b] === 0;
  const beam = createBeam(nodes[a], nodes[b], {
    color: isBreak ? 0xd97706 : 0xc7d2fe,    // muted amber for break, cool white-ish for normal
    opacity: isBreak ? 0.28 : 0.13,
    type: isBreak ? 'failed' : 'sequential',
    particles: true,
    tubeR: isBreak ? 0.030 : 0.020,
  });
  beams.push(beam); scene.add(beam);
});
DATA.semantic.slice(0, 14).forEach(({ i, j, w }) => {
  const beam = createBeam(nodes[i], nodes[j], {
    color: 0x0d9488, opacity: 0.04 * w, type: 'semantic',
    particles: false, tubeR: 0.014,
  });
  beams.push(beam); scene.add(beam);
});

canvas.addEventListener('mousemove', (e) => {
  const r = canvas.getBoundingClientRect();
  mouse.x = ((e.clientX - r.left) / r.width)  *  2 - 1;
  mouse.y = ((e.clientY - r.top)  / r.height) * -2 + 1;
});

  else deselectNode();

canvas.addEventListener('dblclick', () => { resetCamera(); });

function easeOutCubic(t){ return 1 - Math.pow(1 - t, 3); }
function flyCamera(toPos, toTarget, duration=1500) {
  controls.autoRotate = false;
  autoRotateResumeT = performance.now() + 5000;
  const startPos = camera.position.clone();
  const startTgt = controls.target.clone();
  const t0 = performance.now();
  cameraAnim = (now) => {
    const t = Math.min(1, (now - t0) / duration);
    const e = easeOutCubic(t);
    camera.position.lerpVectors(startPos, toPos, e);
    controls.target.lerpVectors(startTgt, toTarget, e);
    if (t >= 1) cameraAnim = null;
  };
}
function selectNode(idx) {
  selected = idx;
  const p = nodes[idx].position.clone();
  const dir = camera.position.clone().sub(controls.target).normalize();
  const newCam = p.clone().add(dir.multiplyScalar(11));
  flyCamera(newCam, p);
  updateInfoPanel(idx);
  updateNodeStates();
  updateTimeline();
}
function deselectNode() {
  selected = null;
  updateInfoPanel(null);
  updateNodeStates();
  updateTimeline();
  autoRotateResumeT = performance.now() + 3000;
}
function resetCamera() {
  flyCamera(new THREE.Vector3(0, 7, 30), new THREE.Vector3(0, 0, 0), 1700);
  deselectNode();
}

function connectedSet(idx) {
  const s = new Set([idx]);
  DATA.sequential.forEach(([a, b]) => { if (a===idx) s.add(b); if (b===idx) s.add(a); });
  DATA.semantic.forEach(({i, j}) => { if (i===idx) s.add(j); if (j===idx) s.add(i); });
  return s;
}
let activeFilter = 'all';
function matchesFilter(i) {
  if (activeFilter === 'all') return true;
  if (activeFilter === 'valid')  return DATA.preds[i] === 1;
  if (activeFilter === 'failed') return DATA.preds[i] === 0;
  return true;
}
function updateNodeStates() {
  const conn = selected !== null ? connectedSet(selected) : null;
  nodes.forEach((n, i) => {
    let intensity = 1.0;
    if (selected !== null && !conn.has(i)) intensity = 0.15;
    if (!matchesFilter(i)) intensity = Math.min(intensity, 0.20);
    n.userData.targetIntensity = intensity;
    n.userData.targetSelOpacity = (selected === i) ? 0.7 : 0;
  });
  beams.forEach(b => {
    if (selected !== null) {
      const involved = (b.userData.fromIdx === selected) || (b.userData.toIdx === selected);
      b.userData.targetOpacity = involved ? Math.min(b.userData.baseOpacity * 4.5, 0.95) : b.userData.baseOpacity * 0.30;
    } else {
      b.userData.targetOpacity = b.userData.baseOpacity;
    }
  });
}

function countUp(el, target, duration, decimals=0, suffix='') {
  const t0 = performance.now();
  function step(now) {
    const t = Math.min(1, (now - t0) / duration);
    const e = 1 - Math.pow(1 - t, 3);
    const v = target * e;
    el.textContent = (decimals === 0 ? Math.round(v) : v.toFixed(decimals)) + suffix;
    if (t < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function updateInfoPanel(idx) {
  panel.classList.remove('hidden');
  if (idx === null) {
    panelEmpty.style.display = 'block';
    panelBody.style.display  = 'none';
    return;
  }
  panelEmpty.style.display = 'none';
  panelBody.style.display  = 'block';

  const valid = DATA.preds[idx] === 1;
  const conf  = DATA.confidences[idx];
  const sal   = DATA.saliency[idx];
  const label = DATA.labels[idx];
  const text  = DATA.steps[idx];

  const deps = [];
  if (idx > 0)     deps.push({ idx: idx-1, dir: '←', label: DATA.labels[idx-1], valid: DATA.preds[idx-1]===1 });
  if (idx < N-1)   deps.push({ idx: idx+1, dir: '→', label: DATA.labels[idx+1], valid: DATA.preds[idx+1]===1 });

  const semNb = DATA.semantic
    .filter(s => s.i === idx || s.j === idx)
    .map(s => ({ idx: s.i === idx ? s.j : s.i, sim: s.w }))
    .sort((a,b) => b.sim - a.sim).slice(0, 3);

  const confColor = valid ? '#22ee88' : '#ff3050';
  const salColor  = '#58a6ff';

  panelBody.innerHTML = `
    <div class="panel-badge ${valid ? 'valid' : 'failed'}">
      ${valid ? '✓ Valid Reasoning' : '✕ Hallucinated'}
    </div>
    <div class="panel-title">Step ${idx+1} · ${label}</div>
    <div class="panel-subtitle">${text}</div>

    <div class="panel-section">
      <div class="panel-section-label">Confidence</div>
      <div class="meter"><div class="meter-fill" style="background:${confColor}; color:${confColor};" data-w="${Math.round(conf*100)}"></div></div>
      <div class="meter-meta"><span class="tag">Model certainty</span><span class="num" data-up="${Math.round(conf*100)}" data-suffix="%">0%</span></div>
    </div>

    <div class="panel-section">
      <div class="panel-section-label">SHAP Influence</div>
      <div class="meter"><div class="meter-fill" style="background:${salColor}; color:${salColor};" data-w="${Math.round(sal*100)}"></div></div>
      <div class="meter-meta"><span class="tag">Attribution score</span><span class="num" data-up3="${sal}">0.000</span></div>
    </div>

    ${deps.length ? `
    <div class="panel-section">
      <div class="panel-section-label">Reasoning path</div>
      ${deps.map(d => `
        <div class="panel-row">
          <span class="key">${d.dir} Step ${d.idx+1} · ${d.label}</span>
          <span class="val ${d.valid ? 'ok' : 'bad'}">${d.valid ? '✓' : '✕'}</span>
        </div>
      `).join('')}
    </div>` : ''}

    ${semNb.length ? `
    <div class="panel-section">
      <div class="panel-section-label">Semantic neighbours</div>
      ${semNb.map(n => `
        <div class="panel-row">
          <span class="key">· Step ${n.idx+1} — ${DATA.labels[n.idx]}</span>
          <span class="val">sim ${n.sim.toFixed(2)}</span>
        </div>
      `).join('')}
    </div>` : ''}
  `;

  requestAnimationFrame(() => {
    panelBody.querySelectorAll('.meter-fill').forEach(el => {
      el.style.width = el.dataset.w + '%';
    });
  });
  panelBody.querySelectorAll('[data-up]').forEach(el => {
    countUp(el, parseInt(el.dataset.up), 1200, 0, el.dataset.suffix || '');
  });
  panelBody.querySelectorAll('[data-up3]').forEach(el => {
    countUp(el, parseFloat(el.dataset.up3), 1200, 3);
  });
}

// ║  ANIMATION LOOP                                            ║
// ╚═══════════════════════════════════════════════════════════╝
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  if (cameraAnim) cameraAnim(performance.now());
  else if (!controls.autoRotate && performance.now() > autoRotateResumeT && selected === null) {
    controls.autoRotate = true;
  }

  // Hover raycast
  raycaster.setFromCamera(mouse, camera);
  const tgts = nodes.map(n => n.userData.target);
  const hits = raycaster.intersectObjects(tgts, false);
  const newHover = hits.length ? hits[0].object.userData.nodeIdx : null;
  if (newHover !== hovered) {
    hovered = newHover;
    canvas.style.cursor = hovered !== null ? 'pointer' : 'grab';
    if (hovered !== null && selected === null) updateInfoPanel(hovered);
    if (hovered === null && selected === null) updateInfoPanel(null);
  }

  // Nodes
  nodes.forEach((n, i) => {
    const u = n.userData;
    n.position.x = u.floatBase.x + Math.sin(t * 0.55 + u.floatPhase) * 0.13;
    n.position.y = u.floatBase.y + Math.cos(t * 0.45 + u.floatPhase * 1.3) * 0.18;
    n.position.z = u.floatBase.z + Math.sin(t * 0.65 + u.floatPhase * 0.7) * 0.10;

    u.ring.rotation.z  =  t * 0.6 + u.phase;
    u.ring2.rotation.z = -t * 0.4 + u.phase * 0.7;
    u.ring2.rotation.y =  t * 0.3 + u.phase * 0.5;

    u.shell.material.uniforms.time.value = t + u.phase;
    u.halo .material.uniforms.time.value = t + u.phase;

    // Smooth intensity
    u.currentIntensity += (u.targetIntensity - u.currentIntensity) * 0.08;
    const isHov = (i === hovered);
    u.targetHoverOpacity = isHov ? 0.85 : 0;
    u.currentHoverOpacity += (u.targetHoverOpacity - u.currentHoverOpacity) * 0.14;
    u.currentSelOpacity   += (u.targetSelOpacity   - u.currentSelOpacity)   * 0.10;

    u.shell.material.uniforms.intensity.value = u.currentIntensity;
    u.halo .material.uniforms.intensity.value = u.currentIntensity * 0.55;
    u.core.material.opacity = 0.85 * u.currentIntensity;
    u.ring.material.opacity  = 0.32 * u.currentIntensity;
    u.ring2.material.opacity = 0.18 * u.currentIntensity;

    u.hoverRing.material.opacity = u.currentHoverOpacity * 0.75;
    u.hoverRing.rotation.z = t * 1.5;
    u.hoverRing.scale.setScalar(1 + Math.sin(t * 3.0) * 0.05);

    u.selCage.material.opacity = u.currentSelOpacity * 0.85;
    u.selCage.rotation.x = t * 0.35;
    u.selCage.rotation.y = t * 0.22;
    u.selCage.scale.setScalar(1 + Math.sin(t * 1.6) * 0.04);

    // Step-number label fades with the rest, never lower than 0.4 so it stays readable
    u.label.material.opacity = Math.max(0.4, u.currentIntensity);

    // Particle spiral
    const pa = u.particles.geometry.attributes.position.array;
    u.pData.forEach((pd, k) => {
      pd.theta += pd.speedT * (isHov ? 2.0 : 1.0);
      pd.phi   += pd.speedP * Math.sin(t + pd.phase);
      const r = pd.baseR + Math.sin(t * 0.85 + pd.phase) * 0.12;
      pa[k*3]   = r * Math.sin(pd.phi) * Math.cos(pd.theta);
      pa[k*3+1] = r * Math.sin(pd.phi) * Math.sin(pd.theta);
      pa[k*3+2] = r * Math.cos(pd.phi);
    });
    u.particles.geometry.attributes.position.needsUpdate = true;
    u.particles.material.opacity = 0.35 * u.currentIntensity;
  });

  // Beams
  beams.forEach(b => {
    const u = b.userData;
    u.currentOpacity += (u.targetOpacity - u.currentOpacity) * 0.08;
    u.tubeMat.opacity = u.currentOpacity;

    if (u.pPoints) {
      const pa = u.pPoints.geometry.attributes.position.array;
      const boost = (selected !== null && (u.fromIdx === selected || u.toIdx === selected)) ? 3.2 : 1.0;
      u.pData.forEach((pd, k) => {
        pd.t += pd.speed * boost;
        if (pd.t > 1) pd.t -= 1;
        const p = u.curve.getPointAt(pd.t);
        pa[k*3] = p.x; pa[k*3+1] = p.y; pa[k*3+2] = p.z;
      });
      u.pPoints.geometry.attributes.position.needsUpdate = true;
      u.pPoints.material.opacity = Math.min(1, u.currentOpacity * 5);
    }
  });

  // Dust drift
  const dpa = dust.geometry.attributes.position.array;
  for (let i = 0; i < DUST_N; i++) {
    dpa[i*3]   += dustVel[i].x;
    dpa[i*3+1] += dustVel[i].y;
    dpa[i*3+2] += dustVel[i].z;
    if (dpa[i*3]   >  35) dpa[i*3]   = -35;
    if (dpa[i*3]   < -35) dpa[i*3]   =  35;
    if (dpa[i*3+1] >  35) dpa[i*3+1] = -35;
    if (dpa[i*3+1] < -35) dpa[i*3+1] =  35;
    if (dpa[i*3+2] >  35) dpa[i*3+2] = -35;
    if (dpa[i*3+2] < -35) dpa[i*3+2] =  35;
  }
  dust.geometry.attributes.position.needsUpdate = true;

  nebulaMat.uniforms.time.value = t;

  controls.update();
  composer.render();
}
animate();
updateInfoPanel(null);
</script>
